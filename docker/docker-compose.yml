name: wp-secure

services:
  mariadb:
    image: mariadb:11.4
    container_name: wp-secure-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

  php:
    build:
      context: ./php
      dockerfile: Dockerfile
    container_name: wp-secure
    restart: unless-stopped
    environment:
      DB_HOST: mariadb
      DB_NAME: wordpress
      DB_USER: wordpress
      DB_PASSWORD: wordpress
    volumes:
      - ../:/var/www/html
    depends_on:
      - mariadb

  nginx:
    image: nginx:1.27-alpine
    container_name: wp-secure-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ../:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

volumes:
  mariadb_data:
